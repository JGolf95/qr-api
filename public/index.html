<!DOCTYPE html>
<html>
<head>
  <title>QR Code API</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: -apple-system, sans-serif;
      max-width: 600px;
      margin: 60px auto;
      padding: 0 20px;
      color: #222;
    }
    h1 { font-size: 28px; }
    p { line-height: 1.6; color: #444; }
    button {
      background: #6772e5;
      color: white;
      border: none;
      padding: 14px 28px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 20px;
    }
    button:hover { background: #5469d4; }
    code {
      background: #f4f4f4;
      padding: 2px 6px;
      border-radius: 4px;
    }
    pre {
      background: #f4f4f4;
      padding: 16px;
      border-radius: 6px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>QR Code API</h1>
  <p>Generate QR codes with a simple API call. $10/month for unlimited access.</p>

  <h3>How it works</h3>
  <pre>GET /qr?text=YOUR_TEXT
Header: x-api-key: YOUR_KEY</pre>

  <button onclick="subscribe()">Subscribe - $10/month</button>

  <script>
    async function subscribe() {
      const res = await fetch('/create-checkout-session', { method: 'POST' });
      const data = await res.json();
      window.location.href = data.url;
    }
  </script>
</body>
</html>
